# Deploy the static site to GitHub Pages on every push to main.
#
# One-time repo setup:
#   Settings -> Pages -> "Build and deployment" -> Source: "GitHub Actions"
#
# There is no build step — index.html, style.css and script.js are
# already browser-ready, so the whole repository is uploaded as-is.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual re-deploys from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; cancel superseded ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # the site lives at the repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
